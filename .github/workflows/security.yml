name: Security audit

on:
  schedule:
    # 毎週月曜 03:00 UTC (= JST 12:00) に走らせる
    - cron: '0 3 * * 1'
  push:
    branches: [main, master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'Cargo.toml'
      - 'src-tauri/Cargo.toml'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'Cargo.toml'
      - 'src-tauri/Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  # push と pull_request の同一 commit 2 run 並走を防ぐため head_ref を優先する。
  # 別 fork の同名ブランチ衝突を避けるため head repo を discriminator に追加。
  group: security-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: npm audit (production deps, level=high)
        run: npm audit --omit=dev --audit-level=high

  cargo-deny:
    name: cargo-deny (advisories / bans / licenses / sources)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps for Tauri 2
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock (gitignored in this repo)
        run: cargo generate-lockfile

      # EmbarkStudios/cargo-deny-action v2.0.17 (commit pin)
      - name: cargo-deny check
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe
        with:
          command: check
          arguments: --workspace --all-features
          log-level: warn
