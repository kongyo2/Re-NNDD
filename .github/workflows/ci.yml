name: CI

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
  workflow_dispatch:

concurrency:
  # push と pull_request は同じ commit でも github.ref が違う (refs/heads/X vs
  # refs/pull/N/merge) ので、ref そのままだと dedup されず 2 run 並走する。
  # branch 名 (head_ref || ref_name) でまとめるが、それだけだと別 fork から
  # 同名ブランチで来た PR や、`main` を head にした fork PR が main push と
  # 衝突するので、head repo (なければ github.repository) を discriminator に
  # 加える (Codex P1 review)。
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  RUSTUP_MAX_RETRIES: '10'
  RUST_BACKTRACE: '1'
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # フロントエンド: Svelte 5 / TypeScript / Vitest / Vite
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint / type / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund

      - name: svelte-kit sync
        run: npx svelte-kit sync

      # Case-insensitive filename collision check (Windows / macOS では `.svelte`
      # と `.svelte.ts` の case 差だけのペアが import 解決を壊して release build
      # が `[MISSING_EXPORT]` でコケる。Linux runner 単独では検出できないので
      # 静的に潰す)
      - name: Check Svelte filename case collisions
        run: bash scripts/check-case-collisions.sh

      - name: Prettier (format check)
        run: npx prettier --check .

      - name: ESLint
        run: npm run lint

      - name: svelte-check (type check)
        run: npm run check

      - name: Vitest (unit / component tests)
        run: npm test -- --reporter=verbose

      - name: Vite production build
        run: npm run build

      - name: Upload SvelteKit build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-${{ github.sha }}
          path: build/
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # E2E: Playwright がフロント (Vite dev server :1420) を実ブラウザで駆動。
  # Tauri IPC は tests/e2e/helpers/tauri-mock.ts で擬装する (実 Rust 不要)。
  # 実 WebKitGTK ウィンドウの駆動は別 (run-re-nndd skill の driver.mjs) の領分。
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund

      # Chromium のみ (playwright.config.ts は chromium プロジェクト 1 本)。
      # --with-deps で WebKit/Chromium が要求する OS ライブラリも入れる。
      - name: Install Playwright browser (chromium) + system deps
        run: npx playwright install --with-deps chromium

      # --with-deps はフォントを含まない。日本語 UI のスクショ文字化け回避に
      # CJK + emoji フォントを明示インストールする。
      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-color-emoji

      # webServer (npm run dev) は playwright.config.ts が CI で自前起動する。
      - name: Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Rust: Tauri 2 ワークスペース (fmt / clippy / test / build)
  # ──────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (fmt / clippy / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies for Tauri 2 (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            pkg-config

      - name: Setup Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-linux
          cache-on-failure: true

      # tauri.conf.json の `externalBin` は build script が物理ファイルの存在を
      # 要求する (clippy / test / build いずれも build script を走らせる)。
      # CI では実バイナリは要らないので空ファイルを置いて pass させる。
      # bundle 本番は release.yml 側で fetch-binaries.sh を走らせる。
      - name: Stub external binaries (yt-dlp / ffmpeg) for build scripts
        run: |
          set -eu
          TRIPLE="$(rustc -vV | awk '/^host:/ {print $2}')"
          mkdir -p src-tauri/binaries
          for name in yt-dlp ffmpeg; do
            f="src-tauri/binaries/${name}-${TRIPLE}"
            : > "$f"
            chmod +x "$f"
          done
          ls -la src-tauri/binaries

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (workspace, all-targets, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --all-targets

      - name: cargo build (workspace, debug)
        run: cargo build --workspace --all-targets

      - name: cargo doc (no-deps, warnings as errors)
        env:
          RUSTDOCFLAGS: '-D warnings'
        run: cargo doc --workspace --no-deps --document-private-items

  # ──────────────────────────────────────────────────────────────────────────
  # GitHub Actions ワークフロー自体の lint
  # ──────────────────────────────────────────────────────────────────────────
  actionlint:
    name: actionlint (workflow files)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # actionlint v1.7.12 にピン留め。
      # Codex review (P2): mutable head reference は merge gate で危険。
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  # ──────────────────────────────────────────────────────────────────────────
  # shell スクリプト lint (scripts/fetch-binaries.sh など)
  # ──────────────────────────────────────────────────────────────────────────
  shellcheck:
    name: shellcheck (scripts/**)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ludeeus/action-shellcheck v2.0.0 (commit pin)
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        with:
          severity: warning
          scandir: scripts

  # ──────────────────────────────────────────────────────────────────────────
  # タイポ検出 (コード/ドキュメント全般)
  # ──────────────────────────────────────────────────────────────────────────
  typos:
    name: typos (spell check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # crate-ci/typos v1.46.1 (commit pin)
      - name: Run typos
        uses: crate-ci/typos@f8a58b6b53f2279f71eb605f03a4ae4d10608f45
        with:
          config: .github/typos.toml

  # ──────────────────────────────────────────────────────────────────────────
  # マージゲート: 全部 green じゃないと通さない
  # ブランチ保護では "ci-success" 1 件だけを required にすればよい
  # ──────────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI success
    # `always()` だと concurrency cancel-in-progress で潰された run の集約も走り、
    # cancelled な needs を「非 success」とみなして fail 判定してしまう (UI が
    # 赤く埋まる)。`!cancelled()` にすると、workflow 自体が cancel された場合は
    # この job も skip になり、branch protection 上は pass 扱いになる。
    # job 単発の failure (timeout/error) はちゃんと拾える。
    if: ${{ !cancelled() }}
    needs:
      - frontend
      - e2e
      - rust
      - actionlint
      - shellcheck
      - typos
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_JSON"
          echo "$NEEDS_JSON" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          failed = [name for name, info in data.items() if info.get("result") != "success"]
          if failed:
              print(f"Failed/skipped jobs: {failed}")
              sys.exit(1)
          print("All required CI jobs succeeded.")
          '
